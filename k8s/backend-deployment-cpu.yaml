# CPU-only fallback — use when GPU node pool is scaled to 0
# Switch: kubectl apply -f k8s/backend-deployment-cpu.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: weather-api
  namespace: gpu-weather
  labels:
    app: weather-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: weather-api
  template:
    metadata:
      labels:
        app: weather-api
    spec:
      # No GPU tolerations or nodeSelector — runs on CPU pool
      containers:
        - name: weather-api
          image: YOURACR.azurecr.io/weather-api:v1
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: "250m"
              memory: "1Gi"
            limits:
              cpu: "1500m"
              memory: "6Gi"
          envFrom:
            - configMapRef:
                name: weather-config
            - secretRef:
                name: weather-secrets
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: weather-api-svc
  namespace: gpu-weather
spec:
  selector:
    app: weather-api
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP

