apiVersion: apps/v1
kind: Deployment
metadata:
  name: crop-api
  namespace: gpu-weather
  labels:
    app: crop-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crop-api
  template:
    metadata:
      labels:
        app: crop-api
    spec:
      containers:
        - name: crop-api
          image: YOURACR.azurecr.io/crop-api:v1
          imagePullPolicy: Always
          ports:
            - containerPort: 8001
          resources:
            requests:
              cpu: "250m"
              memory: "1Gi"
            limits:
              cpu: "1500m"
              memory: "6Gi"
          envFrom:
            - configMapRef:
                name: crop-config
            - secretRef:
                name: weather-secrets
          readinessProbe:
            httpGet:
              path: /api/crop/health
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/crop/health
              port: 8001
            initialDelaySeconds: 60
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: crop-api-svc
  namespace: gpu-weather
spec:
  selector:
    app: crop-api
  ports:
    - port: 8001
      targetPort: 8001
  type: ClusterIP
